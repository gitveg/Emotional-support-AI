name: Deploy to GitHub Pages

on:
  # 推送到 main 分支时自动触发
  push:
    branches: [main]
  # 支持在 GitHub Actions 页面手动触发
  workflow_dispatch:

# 授予写入 GitHub Pages 所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务运行，避免并发冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─── 构建 ───────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          # GitHub Pages 项目站点的路径前缀为 /仓库名
          # 例如：https://your-name.github.io/Emotional-support-AI/
          #
          # 如果你使用的是自定义域名，或者是用户主页 (username.github.io)，
          # 请将下面这行改为：NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Next.js 静态导出输出目录
          path: ./out

  # ─── 部署 ───────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
